# Cargo workspace 根配置
# 编译目标和链接参数在此处配置，对 kernel/ crate 生效
# tests/ crate 通过 make test --target x86_64-unknown-linux-gnu 覆盖此目标

[build]
# 默认编译目标：ARMv8 裸机，无操作系统、无标准库
target = "aarch64-unknown-none"

[target.aarch64-unknown-none]
# 链接脚本由 Makefile 预处理 linker.lds.S 生成，路径相对于 workspace 根目录
rustflags = [
    "-C", "link-arg=-Tkernel/linker.lds",
]

# 使用 LLVM 的 lld 链接器（比系统 ld 更好地支持裸机目标）
linker = "rust-lld"
