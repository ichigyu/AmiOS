# kernel/ 本地 Cargo 配置（仅在直接从 kernel/ 目录运行 cargo 时生效）
#
# 注意：链接脚本由 Makefile 通过 RUSTFLAGS="-C link-arg=-Tkernel/linker.lds" 传入。
# 请始终通过项目根目录的 make build 编译，不要直接在此目录运行 cargo build。
#
# 此文件保留是为了让 rust-analyzer 等工具能识别 target，不含任何实际构建配置。

[build]
target = "aarch64-unknown-none"

[target.aarch64-unknown-none]
linker = "rust-lld"
